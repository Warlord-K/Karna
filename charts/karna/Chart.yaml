apiVersion: v2
name: karna
description: Self-hosted autonomous coding agent — AI plans and implements tasks, opens PRs, and iterates on feedback
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://github.com/warlord-k/karna
sources:
  - https://github.com/warlord-k/karna
keywords:
  - ai
  - agent
  - coding
  - automation
  - kanban
  - github
maintainers:
  - name: warlord-k

dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
