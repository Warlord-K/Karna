apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karna.fullname" . }}-frontend
  labels:
    {{- include "karna.componentLabels" (dict "context" . "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "karna.selectorLabels" (dict "context" . "component" "frontend") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.frontend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "karna.selectorLabels" (dict "context" . "component" "frontend") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "karna.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "karna.image" (dict "image" .Values.frontend.image "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=384"
            - name: AUTH_TRUST_HOST
              value: "true"
            - name: API_URL
              value: "http://{{ include "karna.fullname" . }}-api:8081"
            {{- if .Values.ingress.enabled }}
            - name: AUTH_URL
              value: {{ include "karna.authUrl" . | quote }}
            {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "karna.postgresPasswordSecret" . }}
                  key: {{ include "karna.postgresPasswordSecretKey" . }}
            - name: DATABASE_URL
              value: {{ include "karna.databaseUrl" . }}
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default (include "karna.secretName" .) }}
                  key: {{ .Values.auth.existingSecretAuthKey | default "auth-secret" }}
            {{- if .Values.auth.disabled }}
            - name: AUTH_DISABLED
              value: "true"
            {{- end }}
            {{- if .Values.auth.signupDisabled }}
            - name: SIGNUP_DISABLED
              value: "true"
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
