apiVersion: v1
kind: Service
metadata:
  name: {{ include "karna.fullname" . }}-frontend
  labels:
    {{- include "karna.componentLabels" (dict "context" . "component" "frontend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "karna.selectorLabels" (dict "context" . "component" "frontend") | nindent 4 }}
