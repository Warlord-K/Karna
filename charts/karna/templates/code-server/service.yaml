{{- if .Values.codeServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "karna.fullname" . }}-code-server
  labels:
    {{- include "karna.componentLabels" (dict "context" . "component" "code-server") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "karna.selectorLabels" (dict "context" . "component" "code-server") | nindent 4 }}
{{- end }}
