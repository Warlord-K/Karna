apiVersion: v1
kind: Pod
metadata:
  name: {{ include "karna.fullname" . }}-test-connection
  labels:
    {{- include "karna.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: test-api
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          echo "Testing API health endpoint..."
          wget -qO- http://{{ include "karna.fullname" . }}-api:8081/health && echo " OK" || exit 1
          echo "Testing frontend..."
          wget -qO- --spider http://{{ include "karna.fullname" . }}-frontend:3000/ && echo " OK" || exit 1
          echo "All tests passed!"
