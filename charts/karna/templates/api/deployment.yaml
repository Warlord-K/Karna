apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karna.fullname" . }}-api
  labels:
    {{- include "karna.componentLabels" (dict "context" . "component" "api") | nindent 4 }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "karna.selectorLabels" (dict "context" . "component" "api") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "karna.selectorLabels" (dict "context" . "component" "api") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "karna.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "karna.image" (dict "image" .Values.api.image "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: PORT
              value: "8081"
            - name: CONFIG_PATH
              value: /etc/karna/config.yaml
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "karna.postgresPasswordSecret" . }}
                  key: {{ include "karna.postgresPasswordSecretKey" . }}
            - name: DATABASE_URL
              value: {{ include "karna.databaseUrl" . }}
            - name: REDIS_URL
              value: {{ include "karna.redisUrl" . }}
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default (include "karna.secretName" .) }}
                  key: {{ .Values.auth.existingSecretAuthKey | default "auth-secret" }}
            {{- if .Values.auth.disabled }}
            - name: AUTH_DISABLED
              value: "true"
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/karna/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "karna.configMapName" . }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
