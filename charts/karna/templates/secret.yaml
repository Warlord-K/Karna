{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "karna.secretName" . }}
  labels:
    {{- include "karna.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  auth-secret: {{ (.Values.auth.secret | default (randAlphaNum 64)) | b64enc | quote }}
  {{- if and (not .Values.github.existingSecret) .Values.github.token }}
  github-token: {{ .Values.github.token | b64enc | quote }}
  {{- end }}
  {{- if .Values.github.webhookSecret }}
  webhook-secret: {{ .Values.github.webhookSecret | b64enc | quote }}
  {{- end }}
  {{- if and (not .Values.claude.existingSecret) .Values.claude.oauthToken }}
  oauth-token: {{ .Values.claude.oauthToken | b64enc | quote }}
  {{- end }}
  {{- if and (not .Values.postgresql.enabled) (not .Values.postgresql.external.existingSecret) .Values.postgresql.external.password }}
  postgres-password: {{ .Values.postgresql.external.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.codeServer.password }}
  code-server-password: {{ .Values.codeServer.password | b64enc | quote }}
  {{- end }}
  {{- if and (not .Values.notifications.existingSecret) .Values.notifications.resendApiKey }}
  resend-api-key: {{ .Values.notifications.resendApiKey | b64enc | quote }}
  {{- end }}
{{- end }}
