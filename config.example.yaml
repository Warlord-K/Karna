# ──────────────────────────────────────────────────────────
# Schedules
# ──────────────────────────────────────────────────────────
# Automated agent runs on a cron schedule. The agent explores
# your repos and optionally creates tasks on the kanban board.
#
# Schedules are synced to the database on startup. You can
# toggle/modify them from the UI after that. Config acts as
# the initial template — the DB is authoritative once synced.

schedules:
  - name: Bug Hunter
    prompt: |
      Scan the codebase for bugs, security vulnerabilities, race conditions,
      error handling gaps, and potential crashes. Focus on:
      - Logic errors and off-by-one mistakes
      - Unhandled error paths and missing null checks
      - Security issues (injection, auth bypass, data exposure)
      - Resource leaks (unclosed connections, missing cleanup)
      - Concurrency issues (race conditions, deadlocks)
      Be specific and actionable. Only flag genuine bugs with high confidence.
    cron_expression: "0 */6 * * *"
    task_prefix: BUG
    max_open_tasks: 3
    priority: high
    skills: [security, lint, typecheck]
    enabled: false

  - name: Feature Scout
    prompt: |
      Review the codebase for improvement opportunities. Look for:
      - TODO/FIXME/HACK comments that describe real improvements
      - Dead code that should be cleaned up
      - Performance bottlenecks (N+1 queries, unnecessary re-renders)
      - Missing tests for critical paths
      Prioritize improvements with the most impact. Skip cosmetic changes.
    cron_expression: "0 9 * * 1"
    task_prefix: FEA
    max_open_tasks: 5
    priority: medium
    skills: [test, lint, typecheck]
    enabled: false

# ──────────────────────────────────────────────────────────
# Skills
# ──────────────────────────────────────────────────────────
# 9 built-in skills ship in the skills/ directory:
#   test, lint, typecheck, commit, review, build, migrate, security, add-repo
#
# They are auto-loaded — no need to list them here.
# Repos can also provide their own skills/ directory.
#
# To add custom skills inline:
# skills:
#   - name: deploy-staging
#     description: "Deploy to staging environment"
#     command: "gh workflow run deploy.yml -f environment=staging"
#     phase: implement
#
#   - name: custom-check
#     description: "Run our custom validation script"
#     command: "./scripts/validate.sh"
#     prompt: |
#       Run this after every change to the API layer.
#       It checks backward compatibility of all endpoints.
#     phase: implement
#
# To disable a built-in skill, override it with an empty one:
# skills:
#   - name: security
#     description: "Disabled"
#     phase: none
